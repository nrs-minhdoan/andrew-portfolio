<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Project preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0608"/>
      <stop offset="100%" stop-color="#3a0a0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>

  <circle cx="170" cy="320" r="110" fill="#dc2626" opacity="0.45" filter="url(#glow)"/>
  <circle cx="640" cy="130" r="120" fill="#f59e0b" opacity="0.35" filter="url(#glow)"/>
  <circle cx="540" cy="380" r="90" fill="#f97316" opacity="0.3" filter="url(#glow)"/>

  <g transform="translate(400 225)">
    <circle r="84" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7"/>
    <circle r="56" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
    <circle r="28" fill="url(#accent)"/>
  </g>

  <text x="400" y="430" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="6">
    PROJECT · PREVIEW
  </text>
</svg>
